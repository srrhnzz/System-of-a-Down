<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="main.js" defer></script>
    <title>OSA System Login</title>
</head>
<body>

    <div class="login-wrapper">
        
        <div class="left-panel">
            <div class="logo-container">
                <img src="arellano.png" alt="Arellano University Logo">
                <h2>Login</h2>
            </div>
            <a href="index.html" class="login-link">Don't have an account?</a>
        </div>

        <div class="right-panel">
            <h2>Welcome Back</h2>
            
            <form id="auth-form" novalidate>
                <div class="form-group">
                                        <span class="error-message"></span>
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                    <div id="eye-icon" class="eye-icon"></div> 
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="remember">
                    <label for="remember">Remember Me</label>
                </div>

                <button type="submit" class="signup-btn">Login</button>
                
                            <a href="forgot.html" class="forgot-pass">Forgot password?</a>

            </form>
        </div>

    </div>

</body>
</html>
